<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrainSpark ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0a1f44;
            --deep: #071530;
            --teal: #0ec4c4;
            --coral: #ff6b6b;
            --yellow: #ffd93d;
            --green: #6bcb77;
            --purple: #a855f7;
            --white: #f0f8ff;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        /* FIX: Sternchen statt Bindestrich */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep); /* FIX: Korrekte Variablen-Syntax */
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Sternenhintergrund */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--ocean) 0%, var(--deep) 100%);
            z-index: -1;
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--yellow); font-size: 2.8rem; margin-bottom: 10px; }
        
        .btn {
            background: var(--teal);
            color: var(--deep);
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--teal); }

        .hidden { display: none !important; }

        .island-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 15px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .island-btn:hover { background: var(--purple); }

        /* Quiz Elemente */
        #question-text { font-size: 1.4rem; font-weight: 700; margin: 20px 0; min-height: 60px; }
        .answer-btn {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1.1rem;
        }
        .answer-btn:hover { background: rgba(255,255,255,0.15); }
        
        #timer-bar {
            height: 6px;
            background: var(--green);
            width: 100%;
            border-radius: 3px;
            transition: width 1s linear;
            margin-bottom: 20px;
        }

        #feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
        .correct { background: var(--green); color: var(--deep); }
        .wrong { background: var(--coral); color: white; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div id="game-container">
        <div id="view-start">
            <h1>BrainSpark ⚡</h1>
            <p>Bist du bereit für die Herausforderung?</p>
            <button class="btn" onclick="loadIslands()">SPIEL STARTEN</button>
        </div>

        <div id="view-islands" class="hidden">
            <h2>Wähle deine Welt</h2>
            <div id="island-list" style="margin-top: 20px;"></div>
        </div>

        <div id="view-quiz" class="hidden">
            <div id="timer-bar"></div>
            <div id="question-emoji" style="font-size: 3rem;"></div>
            <div id="question-text"></div>
            <div id="answers-grid"></div>
            <div id="feedback" class="hidden"></div>
        </div>

        <div id="view-result" class="hidden">
            <h2 id="result-title">Fertig!</h2>
            <p id="result-score" style="font-size: 1.5rem; margin: 20px 0;"></p>
            <button class="btn" onclick="location.reload()">NOCHMAL</button>
        </div>
    </div>

    <script>
        let questionsData = null;
        let currentIsland = null;
        let currentLevelIdx = 0;
        let score = 0;
        let timer = null;

        // 1. Daten laden
        async function init() {
            try {
                const response = await fetch('questions.json');
                questionsData = await response.json();
                console.log("Quiz geladen");
            } catch (e) {
                alert("Fehler: questions.json konnte nicht geladen werden.");
            }
        }

        function loadIslands() {
            if(!questionsData) return;
            showView('view-islands');
            const list = document.getElementById('island-list');
            list.innerHTML = '';

            Object.entries(questionsData.islands).forEach(([id, island]) => {
                const div = document.createElement('div');
                div.className = 'island-btn';
                div.innerHTML = `<span>${island.emoji} ${island.name}</span> ➔`;
                div.onclick = () => startQuiz(island);
                list.appendChild(div);
            });
        }

        function startQuiz(island) {
            currentIsland = island;
            currentLevelIdx = 0;
            score = 0;
            showView('view-quiz');
            showLevel();
        }

        function showLevel() {
            const level = currentIsland.levels[currentLevelIdx];
            const feedback = document.getElementById('feedback');
            feedback.classList.add('hidden');
            
            document.getElementById('question-emoji').textContent = level.emoji;
            document.getElementById('question-text').textContent = level.text;
            
            const grid = document.getElementById('answers-grid');
            grid.innerHTML = '';

            level.answers.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = ans;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            let timeLeft = 20;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            
            timer = setInterval(() => {
                timeLeft--;
                bar.style.width = (timeLeft / 20 * 100) + '%';
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    checkAnswer(-1);
                }
            }, 1000);
        }

        function checkAnswer(idx) {
            clearInterval(timer);
            const level = currentIsland.levels[currentLevelIdx];
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');

            if(idx === level.correct) {
                feedback.textContent = "Richtig! ✨ " + level.explain;
                feedback.className = "correct";
                score++;
            } else {
                feedback.textContent = "Falsch! ❌ " + level.explain;
                feedback.className = "wrong";
            }

            setTimeout(() => {
                currentLevelIdx++;
                if(currentLevelIdx < currentIsland.levels.length) {
                    showLevel();
                } else {
                    showResult();
                }
            }, 3000);
        }

        function showResult() {
            showView('view-result');
            document.getElementById('result-score').textContent = `Punkte: ${score} / ${currentIsland.levels.length}`;
        }

        function showView(id) {
            ['view-start', 'view-islands', 'view-quiz', 'view-result'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
