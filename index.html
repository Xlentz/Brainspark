<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexoria</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#071530">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0a1f44; --deep: #071530; --teal: #0ec4c4;
            --coral: #ff6b6b; --yellow: #ffd93d; --green: #6bcb77;
            --purple: #a855f7; --white: #f0f8ff;
            --accent: var(--teal);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep); color: var(--white);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        header { width: 100%; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 31, 68, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid rgba(14, 196, 196, 0.2); }
        
        /* Logo Styling */
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-img { width: 40px; height: 40px; border-radius: 8px; }
        .logo-text { font-family: 'Fredoka One', cursive; font-size: 24px; color: var(--teal); text-shadow: 0 0 10px rgba(14,196,196,0.5); }
        
        .user-stats { display: flex; gap: 15px; align-items: center; }
        .stat-item { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .stat-item.xp { color: var(--yellow); border: 1px solid var(--yellow); }
        main { width: 100%; max-width: 600px; padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .card { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 25px; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 20px; text-align: center; }
        h1 { font-family: 'Fredoka One', cursive; margin-bottom: 15px; color: var(--white); }
        p { margin-bottom: 20px; line-height: 1.6; color: #cbd5e1; }
        .btn { background: var(--accent); color: var(--deep); border: none; padding: 16px 32px; border-radius: 18px; font-size: 18px; font-weight: 800; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.96); }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 24px; cursor: pointer; transition: transform 0.2s; position: relative; overflow: hidden; border: 3px solid rgba(255,255,255,0.1); }
        .cat-card:active { transform: scale(0.95); }
        .cat-emoji { font-size: 40px; margin-bottom: 10px; }
        .cat-name { font-weight: 800; font-size: 14px; text-align: center; padding: 0 10px; }
        .cat-score { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 10px; font-size: 10px; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .progress-bar { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        .question-box { min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 30px; }
        .q-emoji { font-size: 50px; margin-bottom: 15px; }
        .q-text { font-size: 20px; font-weight: 700; text-align: center; }
        .answers-list { display: flex; flex-direction: column; gap: 12px; }
        .answer-btn { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; color: var(--white); font-size: 16px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.2s; }
        .answer-btn.correct { background: var(--green); border-color: var(--green); color: var(--deep); }
        .answer-btn.wrong { background: var(--coral); border-color: var(--coral); color: var(--white); }
        .input-box { background: rgba(255,255,255,0.1); border: 2px solid var(--accent); padding: 15px; border-radius: 15px; width: 100%; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .badge-item { display: flex; flex-direction: column; align-items: center; opacity: 0.3; filter: grayscale(1); transition: 0.3s; }
        .badge-item.earned { opacity: 1; filter: grayscale(0); }
        .badge-icon { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 5px; border: 2px solid gold; }
        .badge-name { font-size: 10px; font-weight: 700; text-align: center; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <header>
        <div class="logo-container" onclick="showView('view-categories')">
            <img src="image.png" alt="Nexoria Logo" class="logo-img">
            <div class="logo-text">NEXORIA</div>
        </div>
        <div class="user-stats">
            <div class="stat-item xp"><span id="user-xp">0</span> XP</div>
            <div class="stat-item" onclick="showView('view-profile')" style="cursor:pointer">👤 <span id="user-name-display">Entdecker</span></div>
        </div>
    </header>

    <main>
        <section id="view-setup" class="view">
            <div class="card">
                <div class="q-emoji">🚀</div>
                <h1>Willkommen!</h1>
                <p>Verrate uns deinen Namen und dein Alter.</p>
                <input type="text" id="input-name" class="input-box" placeholder="Dein Name...">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="btn btn-outline" id="btn-age-junior" onclick="setAge('8-10')">8-10 Jahre</button>
                    <button class="btn btn-outline" id="btn-age-master" onclick="setAge('11-14')">11-14 Jahre</button>
                </div>
                <button class="btn" onclick="startApp()">Expedition starten</button>
            </div>
        </section>

        <section id="view-categories" class="view hidden">
            <h1 style="text-align:center; margin-bottom:20px;">Wähle dein Ziel</h1>
            <div class="grid" id="categories-grid"></div>
            <button class="btn btn-outline" style="margin-top:30px;" onclick="showView('view-profile')">Mein Profil & Erfolge</button>
        </section>

        <section id="view-quiz" class="view hidden">
            <div class="quiz-header">
                <span id="q-count">1/10</span>
                <div class="progress-bar"><div class="progress-fill" id="q-progress"></div></div>
                <span id="q-timer">✨</span>
            </div>
            <div class="card">
                <div class="question-box">
                    <div class="q-emoji" id="display-emoji">❓</div>
                    <div class="q-text" id="display-text">Lade Frage...</div>
                </div>
                <div id="quiz-type-choice" class="answers-list">
                    <button class="answer-btn" onclick="checkAnswer(0)" id="opt0"></button>
                    <button class="answer-btn" onclick="checkAnswer(1)" id="opt1"></button>
                    <button class="answer-btn" onclick="checkAnswer(2)" id="opt2"></button>
                    <button class="answer-btn" onclick="checkAnswer(3)" id="opt3"></button>
                </div>
                <div id="quiz-type-input" class="hidden">
                    <input type="text" id="input-answer" class="input-box" placeholder="Deine Antwort...">
                    <button class="btn" onclick="checkInputAnswer()">Prüfen</button>
                </div>
            </div>
        </section>

        <section id="view-result" class="view hidden">
            <div class="card">
                <h1 id="res-title">Geschafft!</h1>
                <div style="font-size: 60px; margin: 20px 0;">🏆</div>
                <div style="font-size: 32px; font-weight: 800; margin-bottom: 10px;" id="res-score">0 / 10</div>
                <div id="xp-gained" style="color: var(--yellow); font-weight: 700; margin-bottom: 20px;">+0 XP</div>
                <button class="btn" onclick="showView('view-categories')">Zurück zur Übersicht</button>
            </div>
        </section>

        <section id="view-profile" class="view hidden">
            <div class="card">
                <h1 id="prof-name">Entdecker</h1>
                <p id="prof-rank">Rang: Novize</p>
                <div class="stat-item xp" style="justify-content:center; margin-bottom:20px;">Total: <span id="prof-xp">0</span> XP</div>
                <h3>Deine Erfolge</h3>
                <div class="badge-grid" id="badge-container"></div>
                <button class="btn" style="margin-top:20px;" onclick="showView('view-categories')">Weiterlernen</button>
                <button class="btn btn-outline" onclick="resetApp()" style="color:var(--coral); border-color:var(--coral); font-size:12px; padding:10px;">Löschen</button>
            </div>
        </section>
    </main>

    <script>
        let stats = JSON.parse(localStorage.getItem('nexoria_v1.1_stats')) || {
            name: '', age: '8-10', xp: 0, badges: [], highscores: {}
        };
        
        let categoryData = {};
        let currentQuestions = [];
        let currentStep = 0;
        let score = 0;
        let currentCatId = 0;

        const badgeData = {
            'first': { name: 'Erster Schritt', emoji: '👣' },
            'xp': { name: 'XP-Sammler', emoji: '💎' },
            'king': { name: 'König', emoji: '👑' },
            'cat1_8-10': { name: 'Bio-Junior', emoji: '🌱' }, 'cat1_11-14': { name: 'Bio-Master', emoji: '🧬' },
            'cat2_8-10': { name: 'Mathe-Fix', emoji: '🧮' }, 'cat2_11-14': { name: 'Mathe-Genie', emoji: '📉' },
            'cat3_8-10': { name: 'Zeitläufer', emoji: '🕰️' }, 'cat3_11-14': { name: 'Historiker', emoji: '🏛️' },
            'cat4_8-10': { name: 'Sternenkind', emoji: '✨' }, 'cat4_11-14': { name: 'Techniker', emoji: '🛠️' },
            'cat5_8-10': { name: 'Rätselfreund', emoji: '🧩' }, 'cat5_11-14': { name: 'Detektiv', emoji: '🔍' },
            'cat6_8-10': { name: 'Sportskanone', emoji: '⚽' }, 'cat6_11-14': { name: 'Profi-Athlet', emoji: '🏆' },
            'cat7_8-10': { name: 'Vokabel-Star', emoji: '🗣️' }, 'cat7_11-14': { name: 'Sprachtalent', emoji: '🌍' },
            'cat8_8-10': { name: 'Medien-Kids', emoji: '📸' }, 'cat8_11-14': { name: 'Digital Native', emoji: '💻' }
        };

        window.onload = async () => {
            await loadAllCategories();
            updateHeader();
            if(!stats.name) showView('view-setup');
            else showView('view-categories');
        };

        async function loadAllCategories() {
            // Prüfung auf 8 Kategorien
            const expectedIds = [1, 2, 3, 4, 5, 6, 7, 8];
            
            const loadPromises = expectedIds.map(async (id) => {
                try {
                    const resp = await fetch(`./category-${id}.json`);
                    if(resp.ok) {
                        const data = await resp.json();
                        categoryData[id] = data;
                    }
                } catch(e) {
                    console.warn(`Kategorie ${id} konnte nicht geladen werden (evtl. Datei fehlt noch).`);
                }
            });

            await Promise.all(loadPromises);
            renderCategories();
        }

        function renderCategories() {
            const container = document.getElementById('categories-grid');
            if(!container) return;
            container.innerHTML = '';
            
            const sortedIds = Object.keys(categoryData).sort((a, b) => a - b);

            sortedIds.forEach(id => {
                const cat = categoryData[id];
                const high = stats.highscores[`cat_${id}_${stats.age}`] || 0;

                const card = document.createElement('div');
                card.className = 'cat-card';
                card.style.backgroundColor = (cat.color || '#333') + '22';
                card.style.borderColor = cat.color || '#333';
                card.onclick = () => startQuiz(id);
                card.innerHTML = `
                    <div class="cat-score">${high}/10</div>
                    <div class="cat-emoji">${cat.emoji}</div>
                    <div class="cat-name">${cat.name}</div>
                `;
                container.appendChild(card);
            });
        }

        function setAge(a) {
            stats.age = a;
            document.getElementById('btn-age-junior').classList.toggle('btn-outline', a !== '8-10');
            document.getElementById('btn-age-master').classList.toggle('btn-outline', a !== '11-14');
        }

        function startApp() {
            const name = document.getElementById('input-name').value.trim();
            if(!name) return alert("Bitte Namen eingeben!");
            stats.name = name;
            saveStats();
            updateHeader();
            renderCategories();
            showView('view-categories');
        }

        function updateHeader() {
            document.getElementById('user-xp').textContent = stats.xp;
            document.getElementById('user-name-display').textContent = stats.name || 'Entdecker';
        }

        function startQuiz(catId) {
            currentCatId = catId;
            const filtered = categoryData[catId].levels.filter(q => q.ageRange === stats.age);
            currentQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, 10);
            currentStep = 0; score = 0;
            showView('view-quiz');
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentStep];
            document.getElementById('q-count').textContent = `${currentStep + 1} / 10`;
            document.getElementById('q-progress').style.width = `${(currentStep / 10) * 100}%`;
            document.getElementById('display-emoji').textContent = q.emoji;
            document.getElementById('display-text').textContent = q.text;

            // Reset Input field
            document.getElementById('input-answer').value = '';

            if(q.type === 'code') {
                document.getElementById('quiz-type-choice').classList.add('hidden');
                document.getElementById('quiz-type-input').classList.remove('hidden');
            } else {
                document.getElementById('quiz-type-choice').classList.remove('hidden');
                document.getElementById('quiz-type-input').classList.add('hidden');
                for(let i=0; i<4; i++) {
                    const btn = document.getElementById(`opt${i}`);
                    btn.textContent = q.answers[i] || '';
                    btn.className = 'answer-btn';
                    btn.disabled = false;
                }
            }
        }

        function checkAnswer(idx) {
            const q = currentQuestions[currentStep];
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(b => b.disabled = true);
            if(idx === q.correct) { score++; document.getElementById(`opt${idx}`).classList.add('correct'); }
            else { document.getElementById(`opt${idx}`).classList.add('wrong'); document.getElementById(`opt${q.correct}`).classList.add('correct'); }
            setTimeout(nextStep, 1200);
        }

        function checkInputAnswer() {
            const q = currentQuestions[currentStep];
            const val = document.getElementById('input-answer').value.trim().toLowerCase();
            if(val === q.correct.toString().toLowerCase()) score++;
            nextStep();
        }

        function nextStep() {
            currentStep++;
            if(currentStep < 10) showQuestion();
            else finishQuiz();
        }

        function finishQuiz() {
            const key = `cat_${currentCatId}_${stats.age}`;
            if(score > (stats.highscores[key] || 0)) stats.highscores[key] = score;
            stats.xp += (score * 10);
            if(score === 10) {
                const bId = `cat${currentCatId}_${stats.age}`;
                if(!stats.badges.includes(bId)) stats.badges.push(bId);
            }
            saveStats(); updateHeader(); renderCategories(); showView('view-result');
            document.getElementById('res-score').textContent = `${score} / 10`;
            document.getElementById('xp-gained').textContent = `+${score*10} XP!`;
        }

        function saveStats() { localStorage.setItem('nexoria_v1.1_stats', JSON.stringify(stats)); }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-profile') renderBadges();
        }

        function renderBadges() {
            const container = document.getElementById('badge-container');
            if(!container) return;
            container.innerHTML = '';
            Object.keys(badgeData).forEach(id => {
                const b = badgeData[id];
                const earned = stats.badges.includes(id);
                container.innerHTML += `<div class="badge-item ${earned?'earned':''}"><div class="badge-icon">${b.emoji}</div><div class="badge-name">${b.name}</div></div>`;
            });
        }

        function resetApp() { if(confirm("Alles löschen?")) { localStorage.clear(); location.reload(); } }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    </script>
</body>
</html>
