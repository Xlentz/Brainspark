<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexoria</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#071530">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0a1f44; --deep: #071530; --teal: #0ec4c4;
            --coral: #ff6b6b; --yellow: #ffd93d; --green: #6bcb77;
            --purple: #a855f7; --white: #f0f8ff;
            --accent: var(--teal);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep); color: var(--white);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }

        header {
            width: 100%; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 31, 68, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            border-bottom: 2px solid rgba(14, 196, 196, 0.2);
        }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; }
        .logo-text { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--teal); }

        .header-stats { display: flex; align-items: center; gap: 10px; }
        .diff-pill { background: rgba(255,217,61,0.2); color: var(--yellow); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 800; border: 1px solid var(--yellow); }
        .xp-pill { background: rgba(14, 196, 196, 0.2); color: var(--teal); padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 800; }

        main { width: 100%; max-width: 500px; padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .view { animation: fadeIn 0.3s ease; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: none; margin: 10px 0; background: var(--white); font-family: inherit; font-size: 1rem; }

        .btn {
            background: var(--accent); color: var(--deep); border: none; padding: 16px; border-radius: 18px;
            font-weight: 800; font-size: 18px; cursor: pointer; width: 100%; margin-top: 10px;
            box-shadow: 0 4px 0 #088e8e;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #088e8e; }
        .btn-sec { background: var(--coral); box-shadow: 0 4px 0 #d14d4d; color: white; }

        /* Kategorien-Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card {
            aspect-ratio: 1; border-radius: 24px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; border: 3px solid rgba(255,255,255,0.1); transition: 0.2s;
        }
        .cat-card:active { transform: scale(0.95); }
        .cat-emoji { font-size: 40px; margin-bottom: 8px; }
        .cat-name { font-weight: 800; font-size: 14px; text-align: center; }

        /* Ladeindikator */
        .loading-msg {
            grid-column: 1 / -1; text-align: center; opacity: 0.6;
            padding: 30px; font-weight: 700;
        }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(14,196,196,0.3); border-top-color: var(--teal);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Quiz */
        .ans-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .ans-btn { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; color: white; font-weight: 700; text-align: left; cursor: pointer; }
        .ans-btn.correct { background: var(--green); border-color: #4ba356; }
        .ans-btn.wrong { background: var(--coral); border-color: #d14d4d; }
        .ans-btn:disabled { cursor: default; }

        /* Hybrid-Label */
        .hybrid-label {
            text-align: center; font-size: 11px; font-weight: 800;
            color: var(--yellow); margin-bottom: 10px;
            background: rgba(255,217,61,0.12); padding: 5px 12px;
            border-radius: 10px; border: 1px solid rgba(255,217,61,0.3);
        }

        /* Badges im Profil */
        .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .badge-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; text-align: center; opacity: 0.2; filter: grayscale(1); }
        .badge-box.earned { opacity: 1; filter: grayscale(0); border: 1px solid var(--yellow); }
    </style>
</head>
<body>
    <div class="stars"></div>

    <header id="main-header" class="hidden">
        <div class="logo-container" onclick="showView('view-categories')">
            <img src="image.png" class="logo-img" alt="Logo">
            <span class="logo-text">Nexoria</span>
        </div>
        <div class="header-stats">
            <div id="head-diff" class="diff-pill">JUNIOR</div>
            <div class="xp-pill"><span id="head-xp">0</span> XP</div>
            <div onclick="showView('view-profile')" style="cursor:pointer; font-size:20px;">👤</div>
        </div>
    </header>

    <main>
        <section id="view-setup" class="view">
            <div class="card" style="text-align:center;">
                <h1 style="font-size:3rem; color:var(--yellow);">NEXORIA</h1>
                <p>Bereit für dein Abenteuer?</p>
                <input type="text" id="in-name" placeholder="Dein Name..." maxlength="12">
                <select id="in-age">
                    <option value="8-10">Junior (8-10 Jahre)</option>
                    <option value="11-14">Senior (11-14 Jahre)</option>
                </select>
                <button class="btn" onclick="completeSetup()">Starten!</button>
            </div>
        </section>

        <section id="view-categories" class="view hidden">
            <h2 style="margin-bottom:20px; font-family:'Fredoka One';">Wähle dein Ziel:</h2>
            <div class="grid" id="cat-grid">
                <p class="loading-msg"><span class="loading-spinner"></span>Lade Kategorien…</p>
            </div>
        </section>

        <section id="view-quiz" class="view hidden">
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-weight:800; font-size:12px; margin-bottom:15px;">
                    <span id="q-cat-title">Kategorie</span>
                    <span id="q-count">1/10</span>
                </div>

                <div id="q-hybrid-label" class="hybrid-label hidden"></div>

                <div id="q-emoji" style="font-size:50px; text-align:center; margin-bottom:10px;">❓</div>
                <h3 id="q-text" style="text-align:center; margin-bottom:20px;">Frage...</h3>

                <div id="q-answers" class="ans-list"></div>
                <div id="q-input-wrap" class="hidden">
                    <input type="text" id="q-input-val" placeholder="Deine Antwort..." autocomplete="off">
                    <button class="btn" onclick="checkInputAnswer()">Prüfen</button>
                </div>

                <div id="q-feedback" class="hidden" style="margin-top:20px; padding:15px; background:rgba(0,0,0,0.2); border-radius:15px; font-size:14px;"></div>
                <button id="q-next" class="btn hidden" onclick="nextQuestion()">Weiter</button>
            </div>
        </section>

        <section id="view-result" class="view hidden">
            <div class="card" style="text-align:center;">
                <h2 id="res-title">Super!</h2>
                <div id="res-score" style="font-size:40px; font-weight:800; color:var(--yellow); margin:20px 0;">0 / 10</div>
                <p id="res-xp" style="font-weight:800; color:var(--teal);">+0 XP</p>
                <button class="btn" onclick="showView('view-categories')">Zurück zur Karte</button>
            </div>
        </section>

        <section id="view-profile" class="view hidden">
            <div class="card">
                <h2 style="font-family:'Fredoka One'; margin-bottom:15px;">Dein Profil</h2>
                <div style="text-align:left;">
                    <label style="font-size:12px; font-weight:800; color:var(--teal);">Name ändern</label>
                    <input type="text" id="prof-name-in">

                    <label style="font-size:12px; font-weight:800; color:var(--teal);">Schwierigkeit ändern</label>
                    <select id="prof-age-in">
                        <option value="8-10">Junior (8-10 Jahre)</option>
                        <option value="11-14">Senior (11-14 Jahre)</option>
                    </select>
                </div>
                <button class="btn" onclick="saveProfileChanges()">Speichern</button>

                <div style="margin-top:25px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                    <h3 style="font-size:14px;">Deine Erfolge</h3>
                    <div id="badge-grid" class="badge-grid"></div>
                </div>
                <button class="btn btn-sec" style="margin-top:30px;" onclick="resetApp()">Spielstand löschen</button>
            </div>
        </section>
    </main>

    <script>
        // ── Spielzustand ──────────────────────────────────────────────────────
        const STORAGE_KEY = 'nexoria_v1.1_stats';
        let stats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { name: "", xp: 0, badges: [], age: "8-10" };
        let categoryData = {};
        let currentQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let currentCatId = 0;

        // Hybrid-Fragetyp: Schritt-Tracking
        let hybridPhase = 0;          // 0 = kein Hybrid, 1 = Schritt 1, 2 = Schritt 2
        let hybridStep1Correct = false;

        const emojis = { 1:"🌿", 2:"🔢", 3:"⏳", 4:"🚀", 5:"🧩", 6:"⚽", 7:"🇬🇧", 8:"🎬" };

        // ── Initialisierung ───────────────────────────────────────────────────
        function init() {
            if (stats.name) {
                showView('view-categories');
                updateHeader();
            }
            loadCategories();

            // Enter-Taste für Texteingabe
            document.getElementById('q-input-val').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkInputAnswer();
            });
        }

        // ── Kategorien laden ──────────────────────────────────────────────────
        async function loadCategories() {
            let loaded = 0;
            for (let i = 1; i <= 8; i++) {
                try {
                    const r = await fetch(`category-${i}.json`);
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    categoryData[i] = await r.json();
                    loaded++;
                } catch(e) {
                    console.warn(`Kategorie ${i} nicht ladbar:`, e);
                }
            }
            if (loaded === 0) {
                document.getElementById('cat-grid').innerHTML =
                    '<p class="loading-msg" style="color:var(--coral);">Keine Kategorien geladen.<br>Bitte Seite neu laden.</p>';
            } else {
                renderCategoryGrid();
            }
        }

        // ── Setup ─────────────────────────────────────────────────────────────
        function completeSetup() {
            const n = document.getElementById('in-name').value.trim();
            if (!n) { alert("Gib einen Namen ein!"); return; }
            stats.name = n;
            stats.age = document.getElementById('in-age').value;
            saveStats();
            updateHeader();
            showView('view-categories');
        }

        function updateHeader() {
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('head-xp').textContent = stats.xp;
            document.getElementById('head-diff').textContent = stats.age === "8-10" ? "JUNIOR" : "SENIOR";
        }

        // ── Kategorie-Raster ──────────────────────────────────────────────────
        function renderCategoryGrid() {
            const g = document.getElementById('cat-grid');
            g.innerHTML = '';
            Object.keys(categoryData).forEach(id => {
                const cat = categoryData[id];
                const d = document.createElement('div');
                d.className = 'cat-card';
                d.style.backgroundColor = cat.color + '22';
                d.style.borderColor = cat.color;
                d.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span>`;
                d.onclick = () => startQuiz(id);
                g.appendChild(d);
            });
        }

        // ── Quiz starten ──────────────────────────────────────────────────────
        function startQuiz(id) {
            currentCatId = id;
            const cat = categoryData[id];

            currentQuestions = cat.levels
                .filter(q => q.ageRange === stats.age)
                .sort(() => 0.5 - Math.random())
                .slice(0, 10);

            if (currentQuestions.length === 0) {
                alert("Für diesen Modus sind keine Fragen verfügbar.");
                return;
            }

            currentIdx = 0;
            score = 0;
            document.getElementById('q-cat-title').textContent = cat.name;
            showView('view-quiz');
            showQuestion();
        }

        // ── Frage anzeigen ────────────────────────────────────────────────────
        function showQuestion() {
            const q = currentQuestions[currentIdx];

            // Hybrid-Zustand zurücksetzen
            hybridPhase = 0;
            hybridStep1Correct = false;

            // UI zurücksetzen
            document.getElementById('q-count').textContent = `${currentIdx + 1} / ${currentQuestions.length}`;
            document.getElementById('q-emoji').textContent = q.emoji || "❓";
            document.getElementById('q-feedback').classList.add('hidden');
            document.getElementById('q-next').classList.add('hidden');
            document.getElementById('q-hybrid-label').classList.add('hidden');

            const ansBox = document.getElementById('q-answers');
            const inBox  = document.getElementById('q-input-wrap');
            ansBox.innerHTML = '';
            ansBox.classList.add('hidden');
            inBox.classList.add('hidden');
            document.getElementById('q-input-val').value    = '';
            document.getElementById('q-input-val').disabled = false;

            // ── Hybrid-Frage ──
            if (q.type === 'hybrid') {
                hybridPhase = 1;

                const label = document.getElementById('q-hybrid-label');
                label.textContent = '🔗 Schritt 1 von 2';
                label.classList.remove('hidden');

                document.getElementById('q-text').textContent = q.step1.text;
                ansBox.classList.remove('hidden');

                q.step1.answers.forEach((a, i) => {
                    const b = document.createElement('button');
                    b.className = 'ans-btn';
                    b.textContent = a;
                    b.onclick = () => checkHybridStep1(i, b);
                    ansBox.appendChild(b);
                });

            // ── Quiz / Pattern-Frage ──
            } else if (q.type === 'quiz' || q.type === 'pattern') {
                document.getElementById('q-text').textContent = q.text;
                ansBox.classList.remove('hidden');

                q.answers.forEach((a, i) => {
                    const b = document.createElement('button');
                    b.className = 'ans-btn';
                    b.textContent = a;
                    b.onclick = () => checkAnswer(i, b);
                    ansBox.appendChild(b);
                });

            // ── Code / Freitext-Frage ──
            } else {
                document.getElementById('q-text').textContent = q.text;
                inBox.classList.remove('hidden');
                document.getElementById('q-input-val').focus();
            }
        }

        // ── Antwort-Checks ────────────────────────────────────────────────────

        /** Normales Quiz / Pattern */
        function checkAnswer(idx, btn) {
            // Guard: verhindert Mehrfachklicks nach Auflösung
            if (!document.getElementById('q-next').classList.contains('hidden')) return;

            const q    = currentQuestions[currentIdx];
            const btns = document.querySelectorAll('#q-answers .ans-btn');

            // Alle Buttons deaktivieren
            btns.forEach(b => { b.onclick = null; b.disabled = true; });

            if (idx === q.correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                btns[q.correct].classList.add('correct');
            }
            showFeedback(q.explain);
        }

        /** Hybrid – Schritt 1 (Multiple Choice) */
        function checkHybridStep1(idx, btn) {
            if (hybridPhase !== 1) return;

            const q    = currentQuestions[currentIdx];
            const btns = document.querySelectorAll('#q-answers .ans-btn');

            btns.forEach(b => { b.onclick = null; b.disabled = true; });

            hybridStep1Correct = (idx === q.step1.correct);

            if (hybridStep1Correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                btns[q.step1.correct].classList.add('correct');
            }

            // Nach kurzem Delay Schritt 2 zeigen
            setTimeout(() => {
                hybridPhase = 2;

                const label = document.getElementById('q-hybrid-label');
                label.textContent = '🔗 Schritt 2 von 2';

                document.getElementById('q-text').textContent = q.step2.text;

                const inBox = document.getElementById('q-input-wrap');
                inBox.classList.remove('hidden');
                document.getElementById('q-input-val').value    = '';
                document.getElementById('q-input-val').disabled = false;
                document.getElementById('q-input-val').focus();
            }, 800);
        }

        /** Code / Freitext + Hybrid Schritt 2 */
        function checkInputAnswer() {
            // Guard: verhindert Mehrfachklick nach Auflösung
            if (!document.getElementById('q-next').classList.contains('hidden')) return;

            const q   = currentQuestions[currentIdx];
            const val = document.getElementById('q-input-val').value.trim().toLowerCase();

            if (hybridPhase === 2) {
                // Hybrid: Punkt nur wenn BEIDE Schritte korrekt
                const correctVal = q.step2.correct.toString().toLowerCase();
                if (val === correctVal && hybridStep1Correct) {
                    score++;
                }
            } else {
                // Normaler Code-Typ
                const correctVal = q.correct.toString().toLowerCase();
                if (val === correctVal) {
                    score++;
                }
            }

            document.getElementById('q-input-val').disabled = true;
            showFeedback(q.explain);
        }

        // ── Feedback & Navigation ─────────────────────────────────────────────
        function showFeedback(txt) {
            const f = document.getElementById('q-feedback');
            f.innerHTML = `<strong>Wusstest du schon?</strong><br>${txt}`;
            f.classList.remove('hidden');
            document.getElementById('q-next').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < currentQuestions.length) showQuestion();
            else finishQuiz();
        }

        function finishQuiz() {
            showView('view-result');
            document.getElementById('res-score').textContent = `${score} / ${currentQuestions.length}`;
            const xp = score * 10;
            document.getElementById('res-xp').textContent = `+${xp} XP`;
            stats.xp += xp;

            if (score >= 7) {
                const bId = `cat${currentCatId}_${stats.age}`;
                if (!stats.badges.includes(bId)) stats.badges.push(bId);
            }
            saveStats();
            updateHeader();
        }

        // ── Profil ────────────────────────────────────────────────────────────
        function saveProfileChanges() {
            const n = document.getElementById('prof-name-in').value.trim();
            if (!n) { alert("Name darf nicht leer sein!"); return; }
            stats.name = n;
            stats.age  = document.getElementById('prof-age-in').value;
            saveStats();
            updateHeader();
            alert("Profil aktualisiert!");
            showView('view-categories');
        }

        function renderBadges() {
            const g = document.getElementById('badge-grid');
            g.innerHTML = '';
            for (let age of ["8-10", "11-14"]) {
                for (let i = 1; i <= 8; i++) {
                    const bId    = `cat${i}_${age}`;
                    const earned = stats.badges.includes(bId);
                    const label  = age === "8-10" ? "Jr" : "Sr";
                    const name   = categoryData[i]?.name || `#${i}`;
                    g.innerHTML += `<div class="badge-box ${earned ? 'earned' : ''}" title="${name} ${label}">
                        <div style="font-size:20px;">${emojis[i]}</div>
                        <div style="font-size:8px; font-weight:800;">${label}</div>
                    </div>`;
                }
            }
        }

        // ── View-Wechsel ──────────────────────────────────────────────────────
        function showView(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'view-profile') {
                document.getElementById('prof-name-in').value = stats.name;
                document.getElementById('prof-age-in').value  = stats.age;
                renderBadges();
            }
        }

        // ── Persistenz ────────────────────────────────────────────────────────
        function saveStats() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
        }

        function resetApp() {
            if (confirm("Spielstand wirklich löschen?")) {
                // Nur den App-eigenen Schlüssel entfernen, nicht localStorage.clear()
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // ── Start ─────────────────────────────────────────────────────────────
        init();
    </script>
</body>
</html>
