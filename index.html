<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrainSpark ⚡</title>
    
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0a1f44; --deep: #071530; --teal: #0ec4c4;
            --coral: #ff6b6b; --yellow: #ffd93d; --green: #6bcb77;
            --purple: #a855f7; --white: #f0f8ff;
            --accent: var(--teal);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep);
            color: var(--white);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--ocean) 0%, var(--deep) 100%);
            z-index: -1;
        }

        #game-container {
            width: 95%; max-width: 500px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        /* Navigations-Bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 5px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            width: 45px; height: 45px; border-radius: 12px; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .nav-btn:active { transform: scale(0.9); background: var(--accent); }

        /* Schwierigkeits-Switch */
        .switch-container { display: flex; align-items: center; gap: 10px; }
        .switch-label { font-size: 0.85rem; font-weight: 700; opacity: 0.8; }

        .difficulty-switch {
            background: rgba(0,0,0,0.3); padding: 5px; border-radius: 25px;
            display: flex; gap: 5px; border: 1px solid rgba(255,255,255,0.1);
        }
        .diff-opt {
            padding: 6px 12px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .diff-opt.active { background: var(--accent); color: var(--deep); }

        .hint-text {
            font-size: 0.8rem; margin-bottom: 15px; color: var(--yellow);
            opacity: 0.9; font-style: italic;
        }

        .progress-container {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-bottom: 20px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: var(--accent); width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px var(--accent);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--yellow); font-size: 2.5rem; margin-bottom: 10px; }
        .hidden { display: none !important; }

        .btn {
            background: var(--accent); color: var(--deep); border: none;
            padding: 15px 25px; border-radius: 15px; font-size: 1.1rem;
            font-weight: 800; cursor: pointer; transition: 0.2s; margin: 10px 5px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px var(--accent); }
        .btn:active { transform: translateY(2px); box-shadow: 0 0px 0 rgba(0,0,0,0.2); }
        
        .btn-next { background: var(--yellow); color: var(--deep); width: 100%; margin-top: 20px; }

        .category-btn {
            background: rgba(255,255,255,0.1); padding: 18px; margin: 12px 0;
            border-radius: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            font-weight: 700; transition: 0.3s;
        }
        .category-btn:hover { background: var(--accent); transform: scale(1.02); }

        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .answer-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 1rem;
            transition: 0.2s; font-weight: 700;
        }
        .answer-btn:active { background: var(--accent); transform: scale(0.95); }
        .answer-btn:disabled { opacity: 0.6; cursor: default; }

        .feedback { margin-top: 15px; padding: 15px; border-radius: 12px; font-weight: 700; text-align: left; }
        .correct { background: var(--green); color: var(--deep); }
        .wrong { background: var(--coral); color: white; }

        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--accent);
            background: rgba(0,0,0,0.2); color: white; font-size: 1.2rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div id="game-container">
        
        <div id="nav-bar" class="top-bar hidden">
            <button class="nav-btn" onclick="goHome()" title="Home">🏠</button>
            
            <div id="diff-wrapper" class="switch-container">
                <span class="switch-label">Alter:</span>
                <div class="difficulty-switch">
                    <div id="opt-8-10" class="diff-opt" onclick="setDifficulty('8-10')">8-10</div>
                    <div id="opt-11-14" class="diff-opt" onclick="setDifficulty('11-14')">11-14</div>
                </div>
            </div>
        </div>

        <div id="progress-container" class="progress-container hidden">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div id="view-setup" class="fade-in">
            <img src="icon.png" alt="BrainSpark Logo" style="width: 150px; height: 150px; margin: 0 auto 20px; display: block; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h1>BrainSpark</h1>
            <p style="margin-bottom: 25px; font-size: 1.1rem; opacity: 0.9;">Bereit für dein Abenteuer?</p>
            <button class="btn" style="width: 80%" onclick="startApp()">STARTEN</button>
        </div>

        <div id="view-categories" class="hidden">
            <h2 style="margin-bottom: 5px;">Wähle eine Kategorie</h2>
            <p class="hint-text">Tipp: Wähle oben dein Alter passend aus!</p>
            <div id="category-list"></div>
        </div>

        <div id="view-quiz" class="hidden">
            <div id="q-emoji" style="font-size: 3.5rem; margin-bottom: 10px;">🧠</div>
            <p id="q-text" style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px;"></p>
            <div id="q-content"></div>
            <div id="feedback-area" class="hidden">
                <div id="feedback" class="feedback"></div>
                <button class="btn btn-next" onclick="nextLevel()">WEITER ➔</button>
            </div>
        </div>

        <div id="view-result" class="hidden">
            <h2 id="res-title">Kategorie abgeschlossen!</h2>
            <p id="res-score" style="font-size: 2.2rem; margin: 20px 0; color: var(--yellow); font-weight: 800;"></p>
            <button class="btn" onclick="goHome()">ZUR ÜBERSICHT</button>
        </div>
    </div>

    <script>
        let db = null;
        let userAge = localStorage.getItem('brainspark_age') || "8-10";
        let currentLevels = [];
        let levelIdx = 0;
        let score = 0;
        let currentCategory = null;

        async function init() {
            try {
                const res = await fetch('questions.json');
                db = await res.json();
                updateDifficultyUI();
            } catch(e) { console.error("Datenfehler:", e); }
        }

        function startApp() {
            showView('view-categories');
            renderCategories();
        }

        function goHome() {
            currentCategory = null;
            document.documentElement.style.setProperty('--accent', 'var(--teal)');
            showView('view-categories');
            renderCategories();
        }

        function setDifficulty(age) {
            if (currentCategory) return; 

            userAge = age;
            localStorage.setItem('brainspark_age', age);
            updateDifficultyUI();
            renderCategories();
        }

        function updateDifficultyUI() {
            document.querySelectorAll('.diff-opt').forEach(opt => opt.classList.remove('active'));
            const activeOpt = document.getElementById(`opt-${userAge}`);
            if(activeOpt) activeOpt.classList.add('active');
        }

        function renderCategories() {
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            Object.entries(db.islands).forEach(([key, category]) => {
                const div = document.createElement('div');
                div.className = 'category-btn fade-in';
                div.innerHTML = `<span>${category.emoji} ${category.name}</span> ➔`;
                div.onclick = () => startCategory(category);
                list.appendChild(div);
            });
        }

        function startCategory(category) {
            currentCategory = category;
            
            let accentColor = 'var(--teal)';
            // Farbanpassung basierend auf dem Kategorienamen
            if(category.name.includes("Bio") || category.name.includes("Natur")) accentColor = 'var(--green)';
            if(category.name.includes("Kosmos") || category.name.includes("Technik")) accentColor = 'var(--purple)';
            document.documentElement.style.setProperty('--accent', accentColor);

            currentLevels = category.levels.filter(l => l.ageRange === userAge);
            levelIdx = 0; score = 0;
            showView('view-quiz');
            loadLevel();
        }

        function loadLevel() {
            const level = currentLevels[levelIdx];
            const content = document.getElementById('q-content');
            const fbArea = document.getElementById('feedback-area');
            
            const progress = (levelIdx / currentLevels.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            fbArea.classList.add('hidden');
            content.innerHTML = '<div class="fade-in"></div>';
            const inner = content.firstChild;
            
            document.getElementById('q-emoji').textContent = "❓";
            document.getElementById('q-text').textContent = level.text;

            if(level.type === 'quiz' || level.type === 'pattern') {
                if(level.type === 'pattern') {
                    const p = document.createElement('div');
                    p.style.fontSize = '1.8rem'; p.style.margin = '15px 0'; p.style.color = 'var(--yellow)';
                    p.textContent = level.pattern.join(' ');
                    inner.appendChild(p);
                }
                const grid = document.createElement('div');
                grid.className = 'answer-grid';
                level.answers.forEach((ans, i) => {
                    const b = document.createElement('button');
                    b.className = 'answer-btn';
                    b.textContent = ans;
                    b.onclick = () => checkAnswer(i);
                    grid.appendChild(b);
                });
                inner.appendChild(grid);
            } 
            else if(level.type === 'code') {
                inner.innerHTML = `<input type="text" id="code-input" placeholder="Antwort hier tippen..." autocomplete="off">
                                    <button class="btn" style="width:100%" onclick="checkCode()">PRÜFEN</button>`;
            }
        }

        function checkAnswer(idx) {
            const level = currentLevels[levelIdx];
            const feedback = document.getElementById('feedback');
            const fbArea = document.getElementById('feedback-area');
            const btns = document.querySelectorAll('.answer-btn');
            
            btns.forEach(b => b.disabled = true);
            fbArea.classList.remove('hidden');
            document.getElementById('q-emoji').textContent = level.emoji;

            if(idx === level.correct) {
                feedback.innerHTML = `✨ <strong>Richtig!</strong><br>${level.explain}`;
                feedback.className = "feedback correct fade-in";
                score++;
            } else {
                feedback.innerHTML = `❌ <strong>Nicht ganz...</strong><br>${level.explain}`;
                feedback.className = "feedback wrong fade-in";
            }
            
            if(levelIdx === currentLevels.length - 1) {
                document.getElementById('progress-bar').style.width = `100%`;
            }
        }

        function checkCode() {
            const val = document.getElementById('code-input').value.trim().toLowerCase();
            const level = currentLevels[levelIdx];
            if(val === level.correct.toString().toLowerCase()) checkAnswer(level.correct);
            else checkAnswer(-1);
        }

        function nextLevel() {
            levelIdx++;
            if(levelIdx < currentLevels.length) loadLevel();
            else showResult();
        }

        function showResult() {
            showView('view-result');
            document.getElementById('res-score').textContent = `${score} / ${currentLevels.length} Punkte`;
        }

        function showView(id) {
            ['view-setup', 'view-categories', 'view-quiz', 'view-result'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            target.classList.add('fade-in');

            const nav = document.getElementById('nav-bar');
            const prog = document.getElementById('progress-container');
            const diffWrapper = document.getElementById('diff-wrapper');

            if(id === 'view-categories' || id === 'view-quiz') {
                nav.classList.remove('hidden');
                
                if(id === 'view-categories') {
                    diffWrapper.classList.remove('hidden');
                } else {
                    diffWrapper.classList.add('hidden');
                }
            } else {
                nav.classList.add('hidden');
            }
            
            if(id === 'view-quiz') prog.classList.remove('hidden');
            else prog.classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
