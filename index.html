<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrainSpark ⚡</title>
    
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icon.png">
    
    <meta name="apple-mobile-web-app-title" content="BrainSpark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0a1f44; --deep: #071530; --teal: #0ec4c4;
            --coral: #ff6b6b; --yellow: #ffd93d; --green: #6bcb77;
            --purple: #a855f7; --white: #f0f8ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep);
            color: var(--white);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--ocean) 0%, var(--deep) 100%);
            z-index: -1;
        }

        #game-container {
            width: 90%; max-width: 500px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--yellow); font-size: 2.5rem; margin-bottom: 10px; }
        .hidden { display: none !important; }

        .btn {
            background: var(--teal); color: var(--deep); border: none;
            padding: 15px 25px; border-radius: 15px; font-size: 1.1rem;
            font-weight: 800; cursor: pointer; transition: 0.2s; margin: 10px 5px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--teal); }
        
        .btn-next { background: var(--yellow); color: var(--deep); width: 100%; margin-top: 20px; }

        .island-btn {
            background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0;
            border-radius: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            font-weight: 700;
        }
        .island-btn:hover { background: var(--purple); }

        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .answer-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 1rem;
            transition: 0.2s;
        }
        .answer-btn:disabled { opacity: 0.6; cursor: default; }

        .feedback { margin-top: 15px; padding: 15px; border-radius: 12px; font-weight: 700; line-height: 1.4; text-align: left; }
        .correct { background: var(--green); color: var(--deep); }
        .wrong { background: var(--coral); color: white; }

        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.2); color: white; font-size: 1.2rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div id="game-container">
        <div id="view-setup">
            <img src="icon.png" alt="BrainSpark Logo" style="width: 150px; height: 150px; margin: 0 auto 10px auto; display: block; border-radius: 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.4);">
            <h1>BrainSpark</h1>
            <p>Wähle dein Alter:</p>
            <button class="btn" onclick="startApp('8-10')">8 - 10 Jahre</button>
            <button class="btn" onclick="startApp('11-14')">11 - 14 Jahre</button>
        </div>

        <div id="view-islands" class="hidden">
            <h2>Wähle eine Insel</h2>
            <div id="island-list"></div>
        </div>

        <div id="view-quiz" class="hidden">
            <div id="q-emoji" style="font-size: 3.5rem; margin-bottom: 10px;">🧠</div>
            <p id="q-text" style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px;"></p>
            <div id="q-content"></div>
            <div id="feedback-area" class="hidden">
                <div id="feedback" class="feedback"></div>
                <button class="btn btn-next" onclick="nextLevel()">WEITER ➔</button>
            </div>
        </div>

        <div id="view-result" class="hidden">
            <h2 id="res-title">Super gemacht!</h2>
            <p id="res-score" style="font-size: 1.8rem; margin: 20px 0; color: var(--yellow); font-weight: 800;"></p>
            <button class="btn" onclick="location.reload()">HAUPTMENÜ</button>
        </div>
    </div>

    <script>
        let db = null;
        let userAge = "8-10";
        let currentLevels = [];
        let levelIdx = 0;
        let score = 0;

        async function init() {
            try {
                const res = await fetch('questions.json');
                db = await res.json();
            } catch(e) { alert("Fehler beim Laden der questions.json!"); }
        }

        function startApp(age) {
            userAge = age;
            showView('view-islands');
            renderIslands();
        }

        function renderIslands() {
            const list = document.getElementById('island-list');
            list.innerHTML = '';
            Object.entries(db.islands).forEach(([key, island]) => {
                const div = document.createElement('div');
                div.className = 'island-btn';
                div.innerHTML = `<span>${island.emoji} ${island.name}</span> ➔`;
                div.onclick = () => startIsland(island);
                list.appendChild(div);
            });
        }

        function startIsland(island) {
            currentLevels = island.levels.filter(l => l.ageRange === userAge);
            levelIdx = 0; score = 0;
            showView('view-quiz');
            loadLevel();
        }

        function loadLevel() {
            const level = currentLevels[levelIdx];
            const content = document.getElementById('q-content');
            const fbArea = document.getElementById('feedback-area');
            
            fbArea.classList.add('hidden');
            content.innerHTML = '';
            
            // Anti-Spoiler: Zeige nur ein neutrales Emoji während der Frage
            document.getElementById('q-emoji').textContent = "❓";
            document.getElementById('q-text').textContent = level.text;

            if(level.type === 'quiz' || level.type === 'pattern') {
                if(level.type === 'pattern') {
                    const p = document.createElement('div');
                    p.style.fontSize = '1.8rem'; p.style.margin = '15px 0'; p.style.color = 'var(--yellow)';
                    p.textContent = level.pattern.join(' ');
                    content.appendChild(p);
                }
                const grid = document.createElement('div');
                grid.className = 'answer-grid';
                level.answers.forEach((ans, i) => {
                    const b = document.createElement('button');
                    b.className = 'answer-btn';
                    b.textContent = ans;
                    b.onclick = () => checkAnswer(i);
                    grid.appendChild(b);
                });
                content.appendChild(grid);
            } 
            else if(level.type === 'code') {
                content.innerHTML = `<input type="text" id="code-input" placeholder="Antwort hier tippen...">
                                    <button class="btn" style="width:100%" onclick="checkCode()">PRÜFEN</button>`;
            }
            else if(level.type === 'hybrid') {
                renderHybrid(level);
            }
        }

        function renderHybrid(level) {
            const content = document.getElementById('q-content');
            content.innerHTML = `<p style="color:var(--teal); margin-bottom:10px;">Teil 1: Die Wissensfrage</p>
                                 <div class="answer-grid"></div>`;
            const grid = content.querySelector('.answer-grid');
            level.step1.answers.forEach((ans, i) => {
                const b = document.createElement('button');
                b.className = 'answer-btn';
                b.textContent = ans;
                b.onclick = () => {
                    if(i === level.step1.correct) {
                        content.innerHTML = `<div style="background:rgba(0,255,0,0.1); padding:10px; border-radius:10px;">
                                                ✅ Korrekt! Dein Hinweis: <strong>${level.step1.hint}</strong>
                                             </div>
                                             <p style="margin:15px 0;">${level.step2.text}</p>
                                             <input type="text" id="code-input">
                                             <button class="btn" style="width:100%" onclick="checkCode(true)">LÖSEN</button>`;
                    } else { checkAnswer(-1); }
                };
                grid.appendChild(b);
            });
        }

        function checkAnswer(idx) {
            const level = currentLevels[levelIdx];
            const feedback = document.getElementById('feedback');
            const fbArea = document.getElementById('feedback-area');
            const btns = document.querySelectorAll('.answer-btn');
            
            btns.forEach(b => b.disabled = true);
            fbArea.classList.remove('hidden');

            // Erst jetzt das passende Emoji zeigen
            document.getElementById('q-emoji').textContent = level.emoji;

            if(idx === level.correct) {
                feedback.innerHTML = `✨ <strong>Richtig!</strong><br>${level.explain}`;
                feedback.className = "feedback correct";
                score++;
            } else {
                feedback.innerHTML = `❌ <strong>Nicht ganz...</strong><br>${level.explain}`;
                feedback.className = "feedback wrong";
            }
        }

        function checkCode(isHybrid = false) {
            const input = document.getElementById('code-input').value.trim().toLowerCase();
            const level = currentLevels[levelIdx];
            const solution = isHybrid ? level.step2.correct.toString().toLowerCase() : level.correct.toString().toLowerCase();
            
            if(input === solution) checkAnswer(isHybrid ? level.step2.correct : level.correct);
            else checkAnswer(-1);
        }

        function nextLevel() {
            levelIdx++;
            if(levelIdx < currentLevels.length) loadLevel();
            else showResult();
        }

        function showResult() {
            showView('view-result');
            document.getElementById('res-score').textContent = `${score} / ${currentLevels.length} Punkte`;
        }

        function showView(id) {
            ['view-setup', 'view-islands', 'view-quiz', 'view-result'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
