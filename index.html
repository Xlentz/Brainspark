<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrainSpark ⚡</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#071530">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BrainSpark">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ocean: #0a1f44; --deep: #071530; --teal: #0ec4c4;
            --coral: #ff6b6b; --yellow: #ffd93d; --green: #6bcb77;
            --purple: #a855f7; --white: #f0f8ff;
            --accent: var(--teal);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep);
            color: var(--white);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* Hintergrund-Sterne */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--ocean) 0%, var(--deep) 100%);
            z-index: -1;
        }

        #game-container {
            width: 95%; max-width: 500px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        /* Navigation & Status */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 5px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            width: 45px; height: 45px; border-radius: 12px; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }

        .switch-container { display: flex; align-items: center; gap: 10px; }
        .switch-label { font-size: 0.85rem; font-weight: 700; opacity: 0.8; }

        .difficulty-switch {
            background: rgba(0,0,0,0.3); padding: 5px; border-radius: 25px;
            display: flex; gap: 5px; border: 1px solid rgba(255,255,255,0.1);
        }
        .diff-opt {
            padding: 6px 14px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .diff-opt.active { background: var(--accent); color: var(--deep); }

        .progress-container {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-bottom: 20px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: var(--accent); width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* UI Elemente */
        h1 { font-family: 'Fredoka One', cursive; color: var(--yellow); font-size: 2.8rem; margin-bottom: 10px; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            background: var(--accent); color: var(--deep); border: none;
            padding: 18px 25px; border-radius: 18px; font-size: 1.1rem;
            font-weight: 800; cursor: pointer; transition: 0.2s; margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:active { transform: scale(0.96); }
        
        .category-btn {
            background: rgba(255,255,255,0.1); padding: 20px; margin: 12px 0;
            border-radius: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            font-weight: 700; font-size: 1.1rem; transition: 0.3s;
        }
        .category-btn:hover { background: rgba(255,255,255,0.15); }

        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .answer-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 18px 10px; border-radius: 18px; cursor: pointer; 
            font-size: 0.95rem; transition: 0.2s; font-weight: 700;
        }

        .feedback { margin-top: 15px; padding: 20px; border-radius: 15px; font-weight: 700; line-height: 1.4; }
        .correct { background: var(--green); color: var(--deep); }
        .wrong { background: var(--coral); color: white; }

        input[type="text"] {
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--accent);
            background: rgba(0,0,0,0.3); color: white; font-size: 1.3rem; text-align: center;
            margin-top: 10px; font-family: inherit;
        }

        /* Lade-Bildschirm */
        #loading-screen { 
            position: fixed; inset: 0; background: var(--deep); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; 
        }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.1); border-top-color: var(--yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 800; letter-spacing: 1px;">INITIALISIERE...</p>
    </div>

    <div id="game-container">
        <div id="nav-bar" class="top-bar hidden">
            <button class="nav-btn" onclick="goHome()">🏠</button>
            <div id="diff-wrapper" class="switch-container">
                <span class="switch-label">Alter:</span>
                <div class="difficulty-switch">
                    <div id="opt-8-10" class="diff-opt" onclick="setDifficulty('8-10')">8-10</div>
                    <div id="opt-11-14" class="diff-opt" onclick="setDifficulty('11-14')">11-14</div>
                </div>
            </div>
        </div>

        <div id="progress-container" class="progress-container hidden">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div id="view-setup" class="fade-in hidden">
            <img src="icon.png" alt="BrainSpark Logo" style="width: 140px; height: 140px; border-radius: 35px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <h1>BrainSpark</h1>
            <p style="margin-bottom: 25px; opacity: 0.8; font-weight: 600;">Dein täglicher Wissens-Kick! ⚡</p>
            <button class="btn" style="width: 85%" onclick="startApp()">STARTEN</button>
        </div>

        <div id="view-categories" class="hidden">
            <h2 style="margin-bottom: 10px;">Wähle dein Abenteuer</h2>
            <div id="category-list"></div>
        </div>

        <div id="view-quiz" class="hidden">
            <div id="q-emoji" style="font-size: 3.5rem; margin-bottom: 5px;">🧠</div>
            <p id="q-text" style="font-weight: 800; font-size: 1.2rem; margin: 15px 0; line-height: 1.3;"></p>
            
            <div id="q-content"></div>

            <div id="feedback-area" class="hidden">
                <div id="feedback" class="feedback"></div>
                <button class="btn" style="width:100%; margin-top: 15px;" onclick="nextLevel()">WEITER ➔</button>
            </div>
        </div>

        <div id="view-result" class="hidden">
            <h2 style="font-family: 'Fredoka One'; color: var(--yellow); font-size: 2.2rem;">Super gemacht!</h2>
            <div id="res-score" style="font-size: 4rem; font-weight: 900; margin: 20px 0; color: var(--white);"></div>
            <p style="margin-bottom: 25px; font-weight: 700; opacity: 0.8;">Du hast das Level abgeschlossen.</p>
            <button class="btn" style="width: 100%" onclick="goHome()">ZUR ÜBERSICHT</button>
        </div>
    </div>

    <script>
        // Zentrale State-Variablen
        let availableCategories = [];
        let currentLevels = [];
        let levelIdx = 0;
        let score = 0;
        let userAge = localStorage.getItem('brainspark_age') || "8-10";
        let hybridStep = 1;

        // Service Worker für Offline-Support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }

        /**
         * INITIALISIERUNG
         * Scant category-1.json bis category-20.json
         */
        async function init() {
            const loadingScreen = document.getElementById('loading-screen');
            const scanPromises = [];

            // Parallel alle 20 möglichen Slots abfragen
            for (let i = 1; i <= 20; i++) {
                scanPromises.push(
                    fetch(`category-${i}.json`)
                        .then(res => res.ok ? res.json() : null)
                        .catch(() => null)
                );
            }

            const results = await Promise.all(scanPromises);
            availableCategories = results.filter(cat => cat !== null);

            // Simulation einer kurzen Ladezeit für das UI-Feeling
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                    showView('view-setup');
                    updateDifficultyUI();
                }, 500);
            }, 800);
        }

        function setDifficulty(age) {
            userAge = age;
            localStorage.setItem('brainspark_age', age);
            updateDifficultyUI();
            // Falls man in der Kategorien-Übersicht ist, wird diese bei Alterswechsel neu gerendert
            if (!document.getElementById('view-categories').classList.contains('hidden')) {
                renderCategories();
            }
        }

        function updateDifficultyUI() {
            document.querySelectorAll('.diff-opt').forEach(opt => opt.classList.remove('active'));
            const activeOpt = document.getElementById(`opt-${userAge}`);
            if(activeOpt) activeOpt.classList.add('active');
        }

        function startApp() {
            showView('view-categories');
            renderCategories();
        }

        function renderCategories() {
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            
            if (availableCategories.length === 0) {
                list.innerHTML = '<p style="margin-top:20px; opacity:0.6;">Momentan keine Kategorien verfügbar.</p>';
                return;
            }

            availableCategories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'category-btn fade-in';
                div.innerHTML = `<span>${cat.emoji} ${cat.name}</span> <span style="opacity:0.5">➔</span>`;
                div.onclick = () => startQuiz(cat);
                list.appendChild(div);
            });
        }

        /**
         * QUIZ LOGIK
         */
        function startQuiz(cat) {
            // Kategorie-Farbe setzen
            document.documentElement.style.setProperty('--accent', cat.color || 'var(--teal)');
            
            // Fragen für das gewählte Alter filtern
            let pool = cat.levels.filter(l => l.ageRange === userAge);
            
            // Zufällig mischen und genau 10 Fragen ziehen (oder weniger, falls Pool kleiner)
            currentLevels = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
            
            if (currentLevels.length === 0) {
                alert("In dieser Kategorie gibt es noch keine Fragen für dein Alter!");
                return;
            }

            levelIdx = 0; score = 0; hybridStep = 1;
            showView('view-quiz');
            loadLevel();
        }

        function loadLevel() {
            const level = currentLevels[levelIdx];
            const content = document.getElementById('q-content');
            const fbArea = document.getElementById('feedback-area');
            
            // Progress
            document.getElementById('progress-bar').style.width = `${(levelIdx / currentLevels.length) * 100}%`;
            
            fbArea.classList.add('hidden');
            content.innerHTML = '<div class="fade-in"></div>';
            const inner = content.firstChild;
            document.getElementById('q-emoji').textContent = level.emoji || "❓";

            // TYP: QUIZ, PATTERN oder HYBRID STEP 1
            if (level.type === 'quiz' || level.type === 'pattern' || (level.type === 'hybrid' && hybridStep === 1)) {
                let text = level.text;
                let ans = (level.type === 'hybrid') ? level.step1.answers : level.answers;
                
                if(level.type === 'hybrid') text = level.step1.question || level.text;
                document.getElementById('q-text').textContent = text;
                
                if(level.type === 'pattern') {
                    const p = document.createElement('div');
                    p.style.fontSize = '2rem'; p.style.margin = '15px 0'; p.style.color = 'var(--yellow)';
                    p.style.letterSpacing = '5px';
                    p.textContent = level.pattern.join(' ');
                    inner.appendChild(p);
                }

                const grid = document.createElement('div');
                grid.className = 'answer-grid';
                ans.forEach((a, i) => {
                    const b = document.createElement('button');
                    b.className = 'answer-btn';
                    b.textContent = a;
                    b.onclick = () => checkAnswer(i);
                    grid.appendChild(b);
                });
                inner.appendChild(grid);
            } 
            // TYP: CODE oder HYBRID STEP 2 (Text-Eingabe)
            else {
                document.getElementById('q-text').textContent = (level.type === 'hybrid') ? level.step2.text : level.text;
                inner.innerHTML = `
                    <input type="text" id="code-input" placeholder="Deine Antwort..." autocomplete="off" spellcheck="false">
                    <button class="btn" style="width:100%; margin-top:15px" onclick="checkCode()">PRÜFEN</button>
                `;
                document.getElementById('code-input').focus();
            }
        }

        function checkAnswer(idx) {
            const level = currentLevels[levelIdx];
            const correctIdx = (level.type === 'hybrid') ? level.step1.correct : level.correct;
            
            if(idx === correctIdx) {
                if(level.type === 'hybrid' && hybridStep === 1) { 
                    hybridStep = 2; 
                    loadLevel(); 
                } else { 
                    showFeedback(true, level.explain); 
                    score++; 
                }
            } else { 
                showFeedback(false, level.explain); 
            }
        }

        function checkCode() {
            const val = document.getElementById('code-input').value.trim().toLowerCase();
            const level = currentLevels[levelIdx];
            const correctVal = (level.type === 'hybrid') ? level.step2.correct : level.correct;
            
            if(val === correctVal.toString().toLowerCase()) { 
                showFeedback(true, level.explain); 
                score++; 
            } else { 
                showFeedback(false, level.explain); 
            }
        }

        function showFeedback(isCorrect, text) {
            document.getElementById('q-content').innerHTML = "";
            document.getElementById('feedback-area').classList.remove('hidden');
            const fb = document.getElementById('feedback');
            fb.innerHTML = isCorrect ? `✨ <b>Richtig!</b><br>${text}` : `💡 <b>Oje...</b><br>${text}`;
            fb.className = "feedback " + (isCorrect ? "correct" : "wrong");
            document.getElementById('q-emoji').textContent = isCorrect ? "✅" : "❌";
        }

        function nextLevel() {
            levelIdx++;
            hybridStep = 1;
            if(levelIdx < currentLevels.length) loadLevel();
            else showResult();
        }

        function showResult() {
            showView('view-result');
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('res-score').textContent = `${score} / ${currentLevels.length}`;
        }

        function goHome() {
            showView('view-categories');
            renderCategories();
        }

        function showView(id) {
            ['view-setup', 'view-categories', 'view-quiz', 'view-result'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            
            // UI Anpassungen je nach View
            document.getElementById('nav-bar').classList.toggle('hidden', id === 'view-setup');
            document.getElementById('diff-wrapper').style.display = (id === 'view-categories') ? 'flex' : 'none';
            document.getElementById('progress-container').classList.toggle('hidden', id !== 'view-quiz');
        }

        // Start
        init();
    </script>
</body>
</html>
