<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexoria 🏝️</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#071530">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0a1f44; --deep: #071530; --teal: #0ec4c4;
            --coral: #ff6b6b; --yellow: #ffd93d; --green: #6bcb77;
            --purple: #a855f7; --white: #f0f8ff;
            --accent: var(--teal);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep); color: var(--white);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, var(--ocean) 0%, var(--deep) 100%); z-index: -1; }
        
        /* Branding Style */
        .brand-label { font-family: 'Fredoka One', cursive; letter-spacing: 2px; font-size: 1.2rem; color: var(--white); opacity: 0.8; }
        .brand-dot { color: var(--accent); }

        header { width: 100%; max-width: 500px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .xp-pill { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--yellow); color: var(--yellow); font-weight: 800; font-size: 0.8rem; }

        .container { width: 100%; max-width: 500px; padding: 10px 20px; text-align: center; z-index: 1; flex-grow: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 24px; padding: 25px; border: 2px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; }
        
        h1 { font-family: 'Fredoka One', cursive; font-size: 2.5rem; text-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 10px; }
        .btn { background: var(--accent); color: var(--deep); border: none; padding: 14px; border-radius: 16px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s; width: 100%; margin: 8px 0; }
        .btn:active { transform: scale(0.96); }

        .badge-grid { display: flex; justify-content: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .badge { width: 45px; height: 45px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; filter: grayscale(1); opacity: 0.2; border: 1px solid transparent; }
        .badge.unlocked { filter: grayscale(0); opacity: 1; border-color: var(--yellow); background: rgba(255,217,61,0.1); animation: pop 0.4s ease-out; }
        
        @keyframes pop { 0% { transform: scale(0.5); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }

        #category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .cat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; }
        .cat-card:hover { border-color: var(--accent); }
        .cat-best { font-size: 0.7rem; color: var(--teal); font-weight: 800; display: block; margin-top: 5px; }

        .progress-wrap { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s; }
        
        .feedback { margin-top: 15px; padding: 15px; border-radius: 16px; font-weight: 700; }
        .correct { background: var(--green); color: var(--deep); }
        .wrong { background: var(--coral); color: var(--white); }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--accent); font-size: 1.1rem; text-align: center; margin: 10px 0; background: var(--deep); color: white; }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <header id="main-header" class="hidden">
        <div class="user-info" onclick="showView('view-categories')">
            <span id="display-name" style="font-weight: 800;">Gast</span>
        </div>
        <div class="brand-label">NEXORIA<span class="brand-dot">.</span></div>
        <div class="xp-pill" style="border-color: var(--teal); color: var(--teal);"><span id="total-xp">0</span> XP</div>
    </header>

    <div class="container">
        <div id="view-setup" class="card">
            <div class="brand-label" style="margin-bottom: 10px; font-size: 1rem; opacity: 0.5;">WELCOME TO</div>
            <h1>NEXORIA🏝️</h1>
            <p style="margin: 15px 0;">Wie lautet dein Entdecker-Name?</p>
            <input type="text" id="name-input" placeholder="Dein Name..." maxlength="12">
            <button class="btn" onclick="saveName()">Welt betreten</button>
        </div>

        <div id="view-age" class="card hidden">
            <h2>Hallo <span class="user-name-text"></span>!</h2>
            <p style="margin-bottom: 20px;">Wähle deine Schwierigkeitsstufe:</p>
            <button class="btn" onclick="setAge('8-10')" style="background: var(--yellow)">Junior (8-10 J.)</button>
            <button class="btn" onclick="setAge('11-14')" style="background: var(--teal)">Profi (11-14 J.)</button>
        </div>

        <div id="view-categories" class="card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <h3 style="font-size: 0.9rem;">Deine Erfolge</h3>
                <span onclick="showView('view-setup')" style="cursor:pointer; font-size: 0.7rem; opacity: 0.5;">✏️ Name</span>
            </div>
            <div class="badge-grid" id="badge-display">
                <div class="badge" id="badge-first">🥉</div>
                <div class="badge" id="badge-xp">🔥</div>
                <div class="badge" id="badge-king">👑</div>
                <div class="badge" id="badge-cat1">🌿</div>
                <div class="badge" id="badge-cat3">⏳</div>
                <div class="badge" id="badge-cat4">🚀</div>
                <div class="badge" id="badge-cat5">🧩</div>
                <div class="badge" id="badge-cat6">⚽</div>
                <div class="badge" id="badge-cat7">🇬🇧</div>
            </div>
            <hr style="opacity: 0.1; margin: 10px 0;">
            <h2>Wähle eine Insel</h2>
            <div id="category-grid"></div>
        </div>

        <div id="view-quiz" class="card hidden">
            <div class="progress-wrap"><div id="progress-bar"></div></div>
            <div id="q-emoji" style="font-size: 3rem; margin-bottom: 5px;"></div>
            <h3 id="q-text" style="margin-bottom: 20px; min-height: 60px;"></h3>
            <div id="answer-area"></div>
            <div id="feedback-area" class="hidden">
                <div id="feedback-text" class="feedback"></div>
                <button class="btn" onclick="nextLevel()" style="background: var(--white); color: var(--deep); margin-top: 15px;">Weiter ➔</button>
            </div>
        </div>

        <div id="view-result" class="card hidden">
            <h1 id="res-title">Erledigt!</h1>
            <div id="res-score" style="font-size: 3.5rem; font-family: 'Fredoka One'; color: var(--yellow); margin: 10px 0;"></div>
            <p id="xp-gained" style="color: var(--green); font-weight: 800; margin-bottom: 20px;"></p>
            <button class="btn" onclick="showView('view-categories')">Zurück zur Karte</button>
        </div>
    </div>

    <script>
        let ageGroup = '', categories = [], currentLevels = [];
        let levelIdx = 0, score = 0, hybridStep = 1, currentCatId = null;

        // Speicher-Key auf Nexoria umgestellt
        let stats = JSON.parse(localStorage.getItem('nexoria_v1_stats')) || { 
            xp: 0, highscores: {}, name: '', badges: [] 
        };

        async function init() {
            if(stats.name) {
                document.getElementById('name-input').value = stats.name;
                updateUI();
                showView('view-age');
            }
            for(let i=1; i<=7; i++) {
                try {
                    const res = await fetch(`category-${i}.json`);
                    if(res.ok) categories.push({ id: i, ...await res.json() });
                } catch(e) {}
            }
        }

        function saveName() {
            const input = document.getElementById('name-input').value.trim();
            if(input.length < 2) return alert("Wie heißt du?");
            stats.name = input; saveStats(); updateUI(); showView('view-age');
        }

        function setAge(age) {
            ageGroup = age;
            document.getElementById('main-header').classList.remove('hidden');
            showView('view-categories');
            renderCategories();
        }

        function updateUI() {
            document.getElementById('display-name').textContent = stats.name;
            document.querySelectorAll('.user-name-text').forEach(el => el.textContent = stats.name);
            document.getElementById('total-xp').textContent = stats.xp;
            
            stats.badges.forEach(bId => {
                const el = document.getElementById(`badge-${bId}`);
                if(el) el.classList.add('unlocked');
            });
        }

        function renderCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            categories.forEach(cat => {
                const best = stats.highscores[`cat_${cat.id}_${ageGroup}`] || 0;
                const div = document.createElement('div');
                div.className = 'cat-card';
                div.innerHTML = `<span style="font-size:2rem">${cat.emoji}</span><br>
                                 <strong style="font-size:0.8rem">${cat.name}</strong>
                                 <span class="cat-best">${best}/10</span>`;
                div.onclick = () => startQuiz(cat);
                grid.appendChild(div);
            });
        }

        function startQuiz(cat) {
            currentCatId = cat.id;
            document.documentElement.style.setProperty('--accent', cat.color || '#0ec4c4');
            currentLevels = cat.levels.filter(l => l.ageRange === ageGroup).sort(() => Math.random() - 0.5).slice(0, 10);
            levelIdx = 0; score = 0; hybridStep = 1;
            showView('view-quiz');
            loadLevel();
        }

        function loadLevel() {
            const level = currentLevels[levelIdx];
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('answer-area').innerHTML = '';
            document.getElementById('progress-bar').style.width = `${(levelIdx / currentLevels.length) * 100}%`;
            document.getElementById('q-emoji').textContent = level.emoji;
            
            if(level.type === 'hybrid' && hybridStep === 1) {
                document.getElementById('q-text').textContent = level.step1.question;
                renderQuiz(level.step1.answers, level.step1.correct, true);
            } else if(level.type === 'hybrid' && hybridStep === 2) {
                document.getElementById('q-text').textContent = level.step2.text;
                renderCode(true);
            } else {
                document.getElementById('q-text').textContent = level.text;
                if(level.type === 'code') renderCode();
                else renderQuiz(level.answers, level.correct);
            }
        }

        function renderQuiz(answers, correctIdx, isHybrid = false) {
            answers.forEach((ans, i) => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.textContent = ans;
                b.onclick = () => {
                    if(i === correctIdx) { if(isHybrid) { hybridStep=2; loadLevel(); } else { score++; showFeedback(true); } }
                    else showFeedback(false);
                };
                document.getElementById('answer-area').appendChild(b);
            });
        }

        function renderCode(isHybrid = false) {
            const area = document.getElementById('answer-area');
            area.innerHTML = `<input type="text" id="code-in" placeholder="..." autocomplete="off">
                             <button class="btn" onclick="checkCode(${isHybrid})">Prüfen</button>`;
            document.getElementById('code-in').focus();
        }

        function checkCode(isHybrid) {
            const val = document.getElementById('code-in').value.trim().toLowerCase();
            const correct = isHybrid ? currentLevels[levelIdx].step2.correct : currentLevels[levelIdx].correct;
            if(val === correct.toString().toLowerCase()) { score++; showFeedback(true); }
            else showFeedback(false);
        }

        function showFeedback(isCorrect) {
            const level = currentLevels[levelIdx];
            const area = document.getElementById('feedback-area');
            const txt = document.getElementById('feedback-text');
            txt.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            txt.innerHTML = isCorrect ? `✨ <strong>Richtig!</strong><br>${level.explain}` : `❌ <strong>Oje...</strong><br>${level.explain}`;
            area.classList.remove('hidden');
            document.getElementById('answer-area').innerHTML = '';
        }

        function nextLevel() {
            levelIdx++; hybridStep = 1;
            if(levelIdx < currentLevels.length) loadLevel();
            else finishQuiz();
        }

        function finishQuiz() {
            const catKey = `cat_${currentCatId}_${ageGroup}`;
            if(score > (stats.highscores[catKey] || 0)) stats.highscores[catKey] = score;
            const xpGained = score * 10;
            stats.xp += xpGained;

            const addB = (id) => { if(!stats.badges.includes(id)) stats.badges.push(id); };
            addB('first');
            if(stats.xp >= 1000) addB('xp');
            if(score === 10) addB(`cat${currentCatId}`);
            if(Object.values(stats.highscores).filter(s => s === 10).length >= 3) addB('king');

            saveStats(); updateUI(); showView('view-result');
            document.getElementById('res-score').textContent = `${score} / 10`;
            document.getElementById('xp-gained').textContent = `+${xpGained} XP gesammelt!`;
        }

        function saveStats() { localStorage.setItem('nexoria_v1_stats', JSON.stringify(stats)); }

        function showView(id) {
            ['view-setup', 'view-age', 'view-categories', 'view-quiz', 'view-result'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
